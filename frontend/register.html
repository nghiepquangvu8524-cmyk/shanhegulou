<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 · 山河故楼</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
    <style>
        /* ... 保持原有样式不变 ... */
        .auth-page {
            min-height: 100vh;
            background: linear-gradient(160deg, #f8f4ee 0%, #efe8df 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px 36px 32px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .auth-header .logo {
            font-size: 2.4rem;
            color: #b8956a;
            margin-bottom: 4px;
        }
        .auth-header h1 {
            color: #3d2c1b;
            font-size: 1.4rem;
            font-weight: 600;
            font-family: 'STSong', 'SimSun', serif;
        }
        .auth-header p {
            color: #9a8a7a;
            font-size: 0.85rem;
            margin-top: 2px;
        }
        .auth-form .form-group {
            margin-bottom: 14px;
        }
        .auth-form label {
            display: block;
            color: #5a4a3a;
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .auth-form .input-wrap {
            position: relative;
        }
        .auth-form .input-wrap i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #c0b0a0;
            font-size: 0.9rem;
        }
        .auth-form .input-wrap input {
            width: 100%;
            padding: 10px 14px 10px 40px;
            border: 1px solid rgba(184, 149, 106, 0.12);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.5);
            color: #3d2c1b;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }
        .auth-form .input-wrap input:focus {
            border-color: #b8956a;
            box-shadow: 0 0 0 3px rgba(184, 149, 106, 0.04);
            background: #fff;
        }
        .auth-form .input-wrap input::placeholder {
            color: #c0b0a0;
        }
        .auth-form .input-wrap .toggle-pwd {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #c0b0a0;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .pwd-strength {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }
        .pwd-strength .bar {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: rgba(184, 149, 106, 0.08);
            transition: background 0.3s ease;
        }
        .pwd-strength .bar.weak { background: #c0392b; }
        .pwd-strength .bar.medium { background: #f39c12; }
        .pwd-strength .bar.strong { background: #27ae60; }
        .pwd-hint {
            font-size: 0.7rem;
            color: #c0b0a0;
            margin-top: 3px;
        }
        .auth-form .terms {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin: 12px 0 16px;
        }
        .auth-form .terms input[type="checkbox"] {
            accent-color: #b8956a;
            width: 18px;
            height: 18px;
            margin-top: 2px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .auth-form .terms label {
            font-size: 0.82rem;
            color: #9a8a7a;
            font-weight: 400;
            cursor: pointer;
        }
        .auth-form .terms label a {
            color: #b8956a;
            text-decoration: none;
        }
        .auth-form .terms label a:hover {
            text-decoration: underline;
        }
        .btn-auth {
            width: 100%;
            padding: 12px;
            background: #b8956a;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(184, 149, 106, 0.2);
        }
        .btn-auth:hover {
            background: #a8845a;
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(184, 149, 106, 0.3);
        }
        .btn-auth:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .auth-error {
            background: rgba(192, 57, 43, 0.06);
            color: #c0392b;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 14px;
            display: none;
            border-left: 3px solid #c0392b;
        }
        .auth-error.show {
            display: block;
        }
        .auth-success {
            background: rgba(39, 174, 96, 0.06);
            color: #27ae60;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 14px;
            display: none;
            border-left: 3px solid #27ae60;
        }
        .auth-success.show {
            display: block;
        }
        .auth-footer {
            text-align: center;
            margin-top: 18px;
            color: #9a8a7a;
            font-size: 0.85rem;
        }
        .auth-footer a {
            color: #b8956a;
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .auth-back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #9a8a7a;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 16px;
            transition: color 0.3s ease;
        }
        .auth-back-link:hover {
            color: #b8956a;
        }
        @media (max-width: 480px) {
            .auth-container {
                padding: 28px 20px 24px;
                border-radius: 16px;
            }
        }
        body.dark-theme .auth-page {
            background: linear-gradient(160deg, #0a0a1a 0%, #1a1a2e 100%);
        }
        body.dark-theme .auth-container {
            background: rgba(26, 26, 46, 0.85);
            border-color: rgba(255, 255, 255, 0.04);
        }
        body.dark-theme .auth-header h1 {
            color: #f5f0ea;
        }
        body.dark-theme .auth-form label {
            color: rgba(255, 255, 255, 0.6);
        }
        body.dark-theme .auth-form .input-wrap input {
            background: rgba(255, 255, 255, 0.04);
            color: #f5f0ea;
            border-color: rgba(255, 255, 255, 0.06);
        }
        body.dark-theme .auth-form .input-wrap input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: #c9a87b;
        }
        body.dark-theme .auth-form .input-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
        body.dark-theme .auth-form .terms label {
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <a href="index.html" class="auth-back-link">
                <i class="fas fa-arrow-left"></i> 返回首页
            </a>

            <div class="auth-header">
                <div class="logo"><i class="fas fa-landmark"></i></div>
                <h1>加入山河故楼</h1>
                <p>注册账号，分享您的古建筑体验</p>
            </div>

            <div id="authError" class="auth-error"></div>
            <div id="authSuccess" class="auth-success"></div>

            <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="regName">昵称</label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regName" placeholder="请输入昵称" required minlength="2" maxlength="20">
                    </div>
                </div>

                <div class="form-group">
                    <label for="regEmail">邮箱地址</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="请输入邮箱" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="regPassword">密码</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="至少6位，含字母和数字" required minlength="6" oninput="checkPwd(this.value)">
                        <button type="button" class="toggle-pwd" onclick="togglePwd('regPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="pwd-strength" id="pwdBars">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                    <div class="pwd-hint" id="pwdHint">请设置包含字母和数字的密码</div>
                </div>

                <div class="form-group">
                    <label for="regConfirm">确认密码</label>
                    <div class="input-wrap">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="regConfirm" placeholder="再次输入密码" required>
                        <button type="button" class="toggle-pwd" onclick="togglePwd('regConfirm')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="terms">
                    <input type="checkbox" id="agreeTerms" required>
                    <label for="agreeTerms">
                        我已阅读并同意 <a href="#">《用户协议》</a> 和 <a href="#">《隐私政策》</a>
                    </label>
                </div>

                <button type="submit" class="btn-auth" id="registerBtn">
                    <i class="fas fa-user-plus"></i> 注册
                </button>
            </form>

            <div class="auth-footer">
                已有账号？ <a href="login.html">立即登录</a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        function togglePwd(id) {
            var input = document.getElementById(id);
            var icon = input.nextElementSibling.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function checkPwd(pwd) {
            var bars = document.querySelectorAll('#pwdBars .bar');
            var hint = document.getElementById('pwdHint');
            var strength = 0;
            if (pwd.length >= 6) strength++;
            if (/[a-zA-Z]/.test(pwd) && /\d/.test(pwd)) strength++;
            if (pwd.length >= 10) strength++;

            bars.forEach(function(bar, i) {
                bar.className = 'bar';
                if (i < strength) {
                    if (strength === 1) bar.classList.add('weak');
                    else if (strength === 2) bar.classList.add('medium');
                    else if (strength >= 3) bar.classList.add('strong');
                }
            });

            var msgs = ['太简单了', '可以更强', '强度良好', '强度优秀'];
            var colors = ['#c0392b', '#f39c12', '#27ae60', '#27ae60'];
            hint.textContent = msgs[strength] || '请设置包含字母和数字的密码';
            hint.style.color = colors[strength] || '#c0b0a0';
        }

        // ===== 修复：正确调用 async registerUser =====
        async function handleRegister(e) {
            e.preventDefault();
            var name = document.getElementById('regName').value.trim();
            var email = document.getElementById('regEmail').value.trim();
            var pwd = document.getElementById('regPassword').value;
            var confirm = document.getElementById('regConfirm').value;
            var agree = document.getElementById('agreeTerms').checked;
            var errorEl = document.getElementById('authError');
            var successEl = document.getElementById('authSuccess');
            var btn = document.getElementById('registerBtn');

            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            if (!name || !email || !pwd || !confirm) {
                errorEl.textContent = '请填写完整的注册信息';
                errorEl.classList.add('show');
                return;
            }
            if (name.length < 2) {
                errorEl.textContent = '昵称至少2个字符';
                errorEl.classList.add('show');
                return;
            }
            if (!email.includes('@')) {
                errorEl.textContent = '请输入有效的邮箱地址';
                errorEl.classList.add('show');
                return;
            }
            if (pwd.length < 6) {
                errorEl.textContent = '密码至少6位';
                errorEl.classList.add('show');
                return;
            }
            if (!/[a-zA-Z]/.test(pwd) || !/\d/.test(pwd)) {
                errorEl.textContent = '密码需包含字母和数字';
                errorEl.classList.add('show');
                return;
            }
            if (pwd !== confirm) {
                errorEl.textContent = '两次输入的密码不一致';
                errorEl.classList.add('show');
                return;
            }
            if (!agree) {
                errorEl.textContent = '请先同意用户协议';
                errorEl.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';

            try {
                var result = await registerUser(name, email, pwd);
                if (result.success) {
                    successEl.textContent = '注册成功！正在跳转...';
                    successEl.classList.add('show');
                    setTimeout(function() {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    errorEl.textContent = result.error || '注册失败，请重试';
                    errorEl.classList.add('show');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> 注册';
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请确保后端服务已启动 (http://localhost:3000)';
                errorEl.classList.add('show');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> 注册';
                console.error('注册错误:', err);
            }
        }

        if (getCurrentUser()) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
