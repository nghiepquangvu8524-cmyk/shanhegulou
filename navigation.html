<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航 | 山河故楼</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .nav-page {
            min-height: 100vh;
            background: linear-gradient(160deg, #f8f4ee 0%, #efe8df 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .nav-page-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 44px 40px 36px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .nav-page-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .nav-page-header .logo {
            font-size: 2.4rem;
            color: #b8956a;
            margin-bottom: 4px;
        }

        .nav-page-header h1 {
            color: #3d2c1b;
            font-size: 1.4rem;
            font-weight: 600;
            font-family: 'STSong', 'SimSun', serif;
        }

        .nav-page-header p {
            color: #9a8a7a;
            font-size: 0.85rem;
            margin-top: 2px;
        }

        .nav-page-user {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            background: rgba(184, 149, 106, 0.06);
            border-radius: 14px;
            margin-bottom: 20px;
        }

        .nav-page-user .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #b8956a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #fff;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .nav-page-user .info {
            flex: 1;
        }

        .nav-page-user .info .name {
            color: #3d2c1b;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .nav-page-user .info .email {
            color: #9a8a7a;
            font-size: 0.8rem;
        }

        .nav-page-user .logout-btn {
            background: none;
            border: none;
            color: #9a8a7a;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .nav-page-user .logout-btn:hover {
            color: #c0392b;
            background: rgba(192, 57, 43, 0.06);
        }

        .nav-page-user .login-links a {
            color: #b8956a;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .nav-page-user .login-links a:hover {
            text-decoration: underline;
        }

        .nav-page-user .login-links span {
            color: #c0b0a0;
            margin: 0 8px;
        }

        .nav-page-menu {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-page-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #5a4a3a;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-page-item:hover {
            background: rgba(184, 149, 106, 0.06);
            color: #3d2c1b;
        }

        .nav-page-item.active {
            background: rgba(184, 149, 106, 0.08);
            color: #b8956a;
        }

        .nav-page-item i {
            font-size: 1.1rem;
            width: 28px;
            text-align: center;
            flex-shrink: 0;
            color: #b8956a;
        }

        .nav-page-item .info .title {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .nav-page-item .info .desc {
            font-size: 0.78rem;
            color: #9a8a7a;
            margin-top: 1px;
        }

        .nav-page-item .badge {
            background: rgba(184, 149, 106, 0.1);
            color: #b8956a;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            margin-left: auto;
        }

        .nav-page-divider {
            height: 1px;
            background: rgba(184, 149, 106, 0.1);
            margin: 16px 0;
        }

        .nav-page-footer {
            text-align: center;
            margin-top: 24px;
            color: #c0b0a0;
            font-size: 0.75rem;
        }

        .nav-page-footer a {
            color: #b8956a;
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .nav-page-container {
                padding: 32px 20px 28px;
                border-radius: 18px;
            }

            .nav-page-item {
                padding: 10px 14px;
            }

            .nav-page-item i {
                font-size: 1rem;
                width: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="nav-page">
        <div class="nav-page-container">
            <div class="nav-page-header">
                <div class="logo"><i class="fas fa-compass"></i></div>
                <h1>导航菜单</h1>
                <p>探索诗词古建筑的世界</p>
            </div>

            <div class="nav-page-user" id="navPageUser"></div>

            <div class="nav-page-menu">
                <a href="index.html" class="nav-page-item">
                    <i class="fas fa-home"></i>
                    <div class="info">
                        <div class="title">主界面</div>
                        <div class="desc">返回首页</div>
                    </div>
                </a>
                <a href="smart-navigation.html" class="nav-page-item active">
                    <i class="fas fa-map-marked-alt"></i>
                    <div class="info">
                        <div class="title">智能导航</div>
                        <div class="desc">地图导航 · 路线规划</div>
                    </div>
                    <span class="badge">NEW</span>
                </a>
                <a href="buildings.html" class="nav-page-item">
                    <i class="fas fa-comments"></i>
                    <div class="info">
                        <div class="title">用户评价</div>
                        <div class="desc">查看和发表评价</div>
                    </div>
                    <span class="badge" id="navReviewBadge">0</span>
                </a>
                <a href="ai-assistant.html" class="nav-page-item">
                    <i class="fas fa-robot"></i>
                    <div class="info">
                        <div class="title">AI 助手</div>
                        <div class="desc">智能古建筑问答</div>
                    </div>
                    <span class="badge">AI</span>
                </a>
                <a href="profile.html" class="nav-page-item" id="navPageProfile">
                    <i class="fas fa-user-circle"></i>
                    <div class="info">
                        <div class="title">个人中心</div>
                        <div class="desc">管理个人资料</div>
                    </div>
                </a>
            </div>

            <div class="nav-page-divider"></div>

            <div class="nav-page-menu">
                <a href="javascript:void(0)" class="nav-page-item" id="navPageLogout" onclick="handleLogout()" style="display:none;">
                    <i class="fas fa-sign-out-alt" style="color:#c0392b;"></i>
                    <div class="info">
                        <div class="title" style="color:#c0392b;">退出登录</div>
                        <div class="desc">安全退出账号</div>
                    </div>
                </a>
            </div>

            <div class="nav-page-footer">
                © 2025 <a href="index.html">山河故楼</a> · 诗词古建筑地图
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="auth.js"></script>
    <script>
        function updateNavPage() {
            var user = getCurrentUser();
            var section = document.getElementById('navPageUser');
            var profile = document.getElementById('navPageProfile');
            var logout = document.getElementById('navPageLogout');
            var badge = document.getElementById('navReviewBadge');

            var reviews = getReviews();
            badge.textContent = reviews.length;

            if (user) {
                section.innerHTML = `
                    <div class="avatar">${user.name.charAt(0).toUpperCase()}</div>
                    <div class="info">
                        <div class="name">${user.name}</div>
                        <div class="email">${user.email}</div>
                    </div>
                    <button class="logout-btn" onclick="handleLogout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                `;
                profile.style.display = 'flex';
                logout.style.display = 'flex';
            } else {
                section.innerHTML = `
                    <div class="login-links" style="width:100%;text-align:center;padding:4px 0;">
                        <a href="login.html">登录</a>
                        <span>|</span>
                        <a href="register.html">注册</a>
                    </div>
                `;
                profile.style.display = 'none';
                logout.style.display = 'none';
            }
        }

        function handleLogout() {
            if (confirm('确定要退出登录吗？')) {
                logout();
                updateNavPage();
                window.location.href = 'index.html';
            }
        }

        document.addEventListener('DOMContentLoaded', updateNavPage);
        window.handleLogout = handleLogout;
    </script>
</body>
</html>
