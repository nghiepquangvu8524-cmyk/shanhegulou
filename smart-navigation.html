<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智能导航 · 山河故楼</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
    <style>
        .nav-page-wrap {
            min-height: calc(100vh - 200px);
            background: linear-gradient(160deg, #f8f4ee 0%, #efe8df 100%);
            padding: 24px 0 40px;
        }

        .nav-page-wrap .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .nav-page-title {
            margin-bottom: 20px;
        }

        .nav-page-title h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #3d2c1b;
            font-family: 'STSong', 'SimSun', serif;
        }

        .nav-page-title h1 i {
            color: #b8956a;
            margin-right: 10px;
        }

        .nav-page-title p {
            color: #9a8a7a;
            font-size: 0.95rem;
            margin-top: 2px;
        }

        #map-container {
            position: relative;
            height: calc(100vh - 280px);
            min-height: 500px;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: #e8dfd4;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .map-sidebar {
            position: absolute;
            top: 16px;
            left: 16px;
            width: 320px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            padding: 18px 20px;
            z-index: 100;
            max-height: calc(100% - 40px);
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .map-sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .map-sidebar::-webkit-scrollbar-thumb {
            background: rgba(184, 149, 106, 0.2);
            border-radius: 10px;
        }

        .sidebar-header {
            margin-bottom: 14px;
            border-bottom: 1px solid rgba(184, 149, 106, 0.06);
            padding-bottom: 12px;
        }

        .sidebar-header h2 {
            color: #3d2c1b;
            font-size: 1.1rem;
            font-family: 'STSong', 'SimSun', serif;
        }

        .sidebar-header h2 i {
            color: #b8956a;
            margin-right: 6px;
        }

        .sidebar-header p {
            color: #9a8a7a;
            font-size: 0.78rem;
        }

        .search-box {
            position: relative;
            margin-bottom: 14px;
        }

        .search-box input {
            width: 100%;
            padding: 9px 14px 9px 38px;
            border: 1px solid rgba(184, 149, 106, 0.12);
            border-radius: 10px;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.5);
            color: #3d2c1b;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        .search-box input:focus {
            border-color: #b8956a;
            box-shadow: 0 0 0 3px rgba(184, 149, 106, 0.04);
            background: rgba(255, 255, 255, 0.8);
        }

        .search-box input::placeholder {
            color: #c0b0a0;
        }

        .search-box .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #c0b0a0;
            font-size: 0.85rem;
        }

        .search-box .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #c0b0a0;
            cursor: pointer;
            font-size: 0.8rem;
            display: none;
        }

        .search-box .search-clear.show {
            display: block;
        }

        .building-list h3 {
            color: #3d2c1b;
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .building-list h3 span {
            color: #9a8a7a;
            font-weight: 400;
            font-size: 0.75rem;
        }

        #buildingList {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #buildingList li {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(184, 149, 106, 0.04);
            background: rgba(255, 255, 255, 0.3);
        }

        #buildingList li:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateX(3px);
            border-color: rgba(184, 149, 106, 0.1);
        }

        #buildingList li h4 {
            color: #3d2c1b;
            font-size: 0.85rem;
            margin: 0 0 2px 0;
            font-weight: 600;
        }

        #buildingList li .meta {
            color: #9a8a7a;
            font-size: 0.7rem;
        }

        #buildingList li .poem-line {
            font-family: '华文行书', 'STXingkai', 'KaiTi', cursive, serif;
            color: #b8956a;
            font-size: 0.75rem;
            margin-top: 3px;
            line-height: 1.3;
            opacity: 0.6;
        }

        #buildingList .no-result {
            text-align: center;
            color: #c0b0a0;
            padding: 16px 0;
            font-size: 0.8rem;
        }

        .nav-panel-float {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 300px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            padding: 0;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.6);
            overflow: hidden;
        }

        .nav-panel-float .panel-toggle {
            width: 100%;
            padding: 12px 16px;
            background: none;
            border: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            color: #3d2c1b;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .nav-panel-float .panel-toggle:hover {
            background: rgba(184, 149, 106, 0.04);
        }

        .nav-panel-float .panel-toggle i {
            color: #b8956a;
        }

        .nav-panel-float .panel-toggle .arrow {
            transition: transform 0.3s ease;
        }

        .nav-panel-float .panel-toggle .arrow.open {
            transform: rotate(180deg);
        }

        .nav-panel-float .panel-body {
            padding: 0 16px 16px;
            display: none;
        }

        .nav-panel-float .panel-body.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .nav-panel-float .form-group {
            margin-bottom: 12px;
        }

        .nav-panel-float .form-group label {
            display: block;
            color: #5a4a3a;
            font-size: 0.78rem;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .nav-panel-float .form-group .input-wrap {
            position: relative;
        }

        .nav-panel-float .form-group .input-wrap input,
        .nav-panel-float .form-group .input-wrap select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid rgba(184, 149, 106, 0.1);
            border-radius: 8px;
            font-size: 0.82rem;
            background: rgba(255, 255, 255, 0.5);
            color: #3d2c1b;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        .nav-panel-float .form-group .input-wrap input:focus,
        .nav-panel-float .form-group .input-wrap select:focus {
            border-color: #b8956a;
            box-shadow: 0 0 0 3px rgba(184, 149, 106, 0.04);
            background: rgba(255, 255, 255, 0.8);
        }

        .nav-panel-float .form-group .input-wrap input::placeholder {
            color: #c0b0a0;
        }

        .nav-panel-float .form-group .input-wrap .locate-btn {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #b8956a;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .nav-panel-float .form-group .input-wrap .locate-btn:hover {
            background: rgba(184, 149, 106, 0.06);
        }

        .nav-panel-float .plan-btn {
            width: 100%;
            padding: 9px;
            background: #b8956a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .nav-panel-float .plan-btn:hover {
            background: #a8845a;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(184, 149, 106, 0.2);
        }

        .nav-panel-float .route-status {
            margin-top: 8px;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            display: none;
        }

        .nav-panel-float .route-status.show {
            display: block;
        }

        .nav-panel-float .route-status.info {
            background: rgba(52, 152, 219, 0.06);
            color: #2980b9;
            border-left: 3px solid #3498db;
        }

        .nav-panel-float .route-status.error {
            background: rgba(192, 57, 43, 0.06);
            color: #c0392b;
            border-left: 3px solid #e74c3c;
        }

        .nav-panel-float .route-status.success {
            background: rgba(39, 174, 96, 0.06);
            color: #27ae60;
            border-left: 3px solid #2ecc71;
        }

        @media (max-width: 900px) {
            .map-sidebar {
                width: 260px;
                top: 12px;
                left: 12px;
                padding: 14px 16px;
                max-height: 45%;
            }
            .nav-panel-float {
                width: 260px;
                bottom: 12px;
                right: 12px;
            }
        }

        @media (max-width: 640px) {
            .nav-page-wrap {
                padding: 16px 0 24px;
            }
            .nav-page-wrap .container {
                padding: 0 12px;
            }
            .nav-page-title h1 {
                font-size: 1.3rem;
            }
            #map-container {
                height: calc(100vh - 200px);
                min-height: 380px;
                border-radius: 12px;
            }
            .map-sidebar {
                width: calc(100% - 24px);
                top: 12px;
                left: 12px;
                max-height: 40%;
                padding: 12px 14px;
            }
            .sidebar-header h2 {
                font-size: 0.95rem;
            }
            .nav-panel-float {
                width: calc(100% - 24px);
                bottom: 12px;
                right: 12px;
                border-radius: 12px;
            }
            .nav-panel-float .panel-toggle {
                padding: 10px 14px;
                font-size: 0.82rem;
            }
            .nav-panel-float .panel-body {
                padding: 0 14px 14px;
            }
            #buildingList li {
                padding: 8px 10px;
            }
            #buildingList li h4 {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 400px) {
            .map-sidebar {
                padding: 10px 12px;
                max-height: 35%;
                top: 8px;
                left: 8px;
                width: calc(100% - 16px);
            }
            .search-box input {
                padding: 7px 10px 7px 32px;
                font-size: 0.78rem;
            }
            .search-box .search-icon {
                left: 10px;
                font-size: 0.75rem;
            }
            #buildingList li {
                padding: 6px 8px;
            }
            .nav-panel-float .form-group .input-wrap input,
            .nav-panel-float .form-group .input-wrap select {
                padding: 6px 10px;
                font-size: 0.75rem;
            }
            .nav-panel-float .plan-btn {
                padding: 7px;
                font-size: 0.78rem;
            }
        }

        body.dark-theme .nav-page-wrap {
            background: linear-gradient(160deg, #0a0a1a 0%, #1a1a2e 100%);
        }

        body.dark-theme .nav-page-title h1 {
            color: #f5f0ea;
        }

        body.dark-theme .nav-page-title p {
            color: rgba(255, 255, 255, 0.4);
        }

        body.dark-theme #map-container {
            border-color: rgba(255, 255, 255, 0.04);
        }

        body.dark-theme .map-sidebar {
            background: rgba(26, 26, 46, 0.92);
            border-color: rgba(255, 255, 255, 0.04);
        }

        body.dark-theme .sidebar-header h2 {
            color: #f5f0ea;
        }

        body.dark-theme .sidebar-header p {
            color: rgba(255, 255, 255, 0.3);
        }

        body.dark-theme .search-box input {
            background: rgba(255, 255, 255, 0.04);
            color: #f5f0ea;
            border-color: rgba(255, 255, 255, 0.06);
        }

        body.dark-theme .search-box input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: #c9a87b;
        }

        body.dark-theme .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        body.dark-theme .building-list h3 {
            color: #f5f0ea;
        }

        body.dark-theme #buildingList li {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.03);
        }

        body.dark-theme #buildingList li:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        body.dark-theme #buildingList li h4 {
            color: #f5f0ea;
        }

        body.dark-theme #buildingList li .meta {
            color: rgba(255, 255, 255, 0.3);
        }

        body.dark-theme .nav-panel-float {
            background: rgba(26, 26, 46, 0.92);
            border-color: rgba(255, 255, 255, 0.04);
        }

        body.dark-theme .nav-panel-float .panel-toggle {
            color: #f5f0ea;
        }

        body.dark-theme .nav-panel-float .form-group label {
            color: rgba(255, 255, 255, 0.5);
        }

        body.dark-theme .nav-panel-float .form-group .input-wrap input,
        body.dark-theme .nav-panel-float .form-group .input-wrap select {
            background: rgba(255, 255, 255, 0.04);
            color: #f5f0ea;
            border-color: rgba(255, 255, 255, 0.06);
        }

        body.dark-theme .nav-panel-float .form-group .input-wrap input:focus,
        body.dark-theme .nav-panel-float .form-group .input-wrap select:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: #c9a87b;
        }

        body.dark-theme .nav-panel-float .form-group .input-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<main class="nav-page-wrap">
    <div class="container">
        <div class="nav-page-title">
            <h1><i class="fas fa-map-marked-alt"></i> 智能导航</h1>
            <p>诗词古建筑地图 · 一键规划路线</p>
        </div>

        <div id="map-container">
            <div id="map"></div>

            <div class="map-sidebar">
                <div class="sidebar-header">
                    <h2><i class="fas fa-landmark"></i> 诗词古建</h2>
                    <p>点击标记查看详情 · 搜索快速定位</p>
                </div>

                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="mapSearchInput" placeholder="搜索建筑名、诗人或诗句..." />

                    </button>
                </div>

                <div class="building-list">
                    <h3>建筑列表 <span id="buildingCount"></span></h3>
                    <ul id="buildingList"></ul>
                </div>
            </div>

            <div class="nav-panel-float" id="navPanel">
                <button class="panel-toggle" onclick="togglePanel()">
                    <span><i class="fas fa-route"></i> 路径规划</span>
                    <i class="fas fa-chevron-down arrow" id="panelArrow"></i>
                </button>

                <div class="panel-body" id="panelBody">
                    <div class="form-group">
                        <label for="startLocation">起始位置</label>
                        <div class="input-wrap">
                            <input type="text" id="startLocation" placeholder="输入地址或坐标" />
                            <button class="locate-btn" onclick="getCurrentLocation()" title="定位当前位置">
                                <i class="fas fa-map-marker-alt"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="endBuilding">终点建筑</label>
                        <div class="input-wrap">
                            <select id="endBuilding">
                                <option value="">请选择建筑...</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="navMode">交通方式</label>
                        <div class="input-wrap">
                            <select id="navMode">
                                <option value="drive">🚗 驾车</option>
                                <option value="bus">🚌 公交</option>
                            </select>
                        </div>
                    </div>

                    <button class="plan-btn" onclick="planRoute()">
                        <i class="fas fa-search-location"></i> 规划路径
                    </button>

                    <div class="route-status" id="routeStatus"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    var buildingsData = [
        { id: 1, name: "滕王阁", dynasty: "唐", author: "王勃",
            poem: "滕王高阁临江渚，佩玉鸣鸾罢歌舞。\n画栋朝飞南浦云，珠帘暮卷西山雨。\n闲云潭影日悠悠，物换星移几度秋。\n阁中帝子今何在？槛外长江空自流。",
            location: { lng: 115.8698, lat: 28.6826 },
            desc: "唐代楼阁建筑，位于江西省南昌市，因王勃《滕王阁序》而闻名。"
        },
        { id: 2, name: "黄鹤楼", dynasty: "唐", author: "崔颢",
            poem: "昔人已乘黄鹤去，此地空余黄鹤楼。\n黄鹤一去不复返，白云千载空悠悠。\n晴川历历汉阳树，芳草萋萋鹦鹉洲。\n日暮乡关何处是？烟波江上使人愁。",
            location: { lng: 114.3113, lat: 30.5454 },
            desc: "清代楼阁建筑，位于湖北省武汉市，与滕王阁、岳阳楼并称为江南三大名楼。"
        },
        { id: 3, name: "岳阳楼", dynasty: "宋", author: "范仲淹",
            poem: "庆历四年春，滕子京谪守巴陵郡。越明年，政通人和，百废具兴，乃重修岳阳楼。\n衔远山，吞长江，浩浩汤汤，横无际涯；朝晖夕阴，气象万千。\n先天下之忧而忧，后天下之乐而乐。",
            location: { lng: 113.0920, lat: 29.3547 },

    function gcj02ToBd09(lng, lat) {
        var x = lng, y = lat;
        var z = Math.sqrt(x * x + y * y) + 0.00002 * Math.sin(y * Math.PI * 3000.0 / 180.0);
        var theta = Math.atan2(y, x) + 0.000003 * Math.cos(x * Math.PI * 3000.0 / 180.0);
        var bd_lng = z * Math.cos(theta) + 0.0065;
        var bd_lat = z * Math.sin(theta) + 0.006;
        return { lng: bd_lng, lat: bd_lat };
    }

    var PI = Math.PI;
    var a = 6378245.0;
    var ee = 0.00669342162296594323;

    function outOfChina(lng, lat) {
        return (lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271);
    }

    function transformLat(lng, lat) {
        var ret = -100.0 + 2.0 * lng + 3.0 * lat + 0.2 * lat * lat +
            0.1 * lng * lat + 0.2 * Math.sqrt(Math.abs(lng));
        ret += (20.0 * Math.sin(6.0 * lng * PI) + 20.0 * Math.sin(2.0 * lng * PI)) * 2.0 / 3.0;
        ret += (20.0 * Math.sin(lat * PI) + 40.0 * Math.sin(lat / 3.0 * PI)) * 2.0 / 3.0;
        ret += (160.0 * Math.sin(lat / 12.0 * PI) + 320 * Math.sin(lat * PI / 30.0)) * 2.0 / 3.0;
        return ret;
    }

    function transformLng(lng, lat) {
        var ret = 300.0 + lng + 2.0 * lat + 0.1 * lng * lng +
            0.1 * lng * lat + 0.1 * Math.sqrt(Math.abs(lng));
        ret += (20.0 * Math.sin(6.0 * lng * PI) + 20.0 * Math.sin(2.0 * lng * PI)) * 2.0 / 3.0;
        ret += (20.0 * Math.sin(lng * PI) + 40.0 * Math.sin(lng / 3.0 * PI)) * 2.0 / 3.0;
        ret += (150.0 * Math.sin(lng / 12.0 * PI) + 300.0 * Math.sin(lng / 30.0 * PI)) * 2.0 / 3.0;
        return ret;
    }

    function wgs84ToGcj02(lng, lat) {
        if (outOfChina(lng, lat)) return { lng: lng, lat: lat };
        var dLat = transformLat(lng - 105.0, lat - 35.0);
        var dLng = transformLng(lng - 105.0, lat - 35.0);
        var radLat = lat / 180.0 * PI;
        var magic = Math.sin(radLat);
        magic = 1 - ee * magic * magic;
        var sqrtMagic = Math.sqrt(magic);
        dLat = (dLat * 180.0) / ((a * (1 - ee)) / (magic * sqrtMagic) * PI);
        dLng = (dLng * 180.0) / (a / sqrtMagic * Math.cos(radLat) * PI);
        return { lng: lng + dLng, lat: lat + dLat };
    }

    function initMap() {
        map = new BMap.Map("map", { enableMapClick: false });

        var centerBd = gcj02ToBd09(105, 35);
        map.centerAndZoom(new BMap.Point(centerBd.lng, centerBd.lat), 5);

        map.enableScrollWheelZoom(true);
        map.addControl(new BMap.NavigationControl());
        map.addControl(new BMap.ScaleControl());

        geocoder = new BMap.Geocoder();

        drivingRoute = new BMap.DrivingRoute(map, { renderOptions: { map: map, autoViewport: true } });
        transitRoute = new BMap.TransitRoute(map, { renderOptions: { map: map, autoViewport: true } });

        addMarkers();
        initBuildingList();
        initSearch();
        initBuildingSelect();
        updateBuildingCount();
    }

    function addMarkers() {
        for (var i = 0; i < buildingsData.length; i++) {
            var b = buildingsData[i];
            var bd = gcj02ToBd09(b.location.lng, b.location.lat);
            var pt = new BMap.Point(bd.lng, bd.lat);

            var marker = new BMap.Marker(pt);
            map.addOverlay(marker);
            markers.push(marker);

            var poemLine = b.poem.split('\n')[0];

    function initSearch() {
        var searchInput = document.getElementById('mapSearchInput');
        var clearBtn = document.getElementById('searchClear');

        function performSearch() {
            var keyword = searchInput.value.toLowerCase();
            var buildingList = document.getElementById('buildingList');
            buildingList.innerHTML = '';

            if (keyword === '') {
                initBuildingList();
                updateBuildingCount();
                clearBtn.classList.remove('show');
                return;
            }

            clearBtn.classList.add('show');

            var filtered = buildingsData.filter(function(b) {
                return b.name.toLowerCase().indexOf(keyword) !== -1 ||
                    b.dynasty.toLowerCase().indexOf(keyword) !== -1 ||
                    b.author.toLowerCase().indexOf(keyword) !== -1 ||
                    b.poem.toLowerCase().indexOf(keyword) !== -1 ||
                    b.desc.toLowerCase().indexOf(keyword) !== -1;
            });

            if (filtered.length === 0) {
                buildingList.innerHTML = '<li class="no-result"><i class="fas fa-search" style="display:block;margin-bottom:6px;font-size:1.2rem;"></i>未找到相关建筑</li>';
                return;
            }

            for (var i = 0; i < filtered.length; i++) {
                (function() {
                    var b = filtered[i];
                    var li = document.createElement('li');
                    var poemLine = b.poem.split('\n')[0];

                    li.innerHTML =
                        '<h4>' + b.name + '</h4>' +
                        '<div class="meta">' + b.dynasty + ' · ' + b.author + '</div>' +
                        '<div class="poem-line">' + poemLine + '</div>';

                    li.onclick = function() {
                        var bd = gcj02ToBd09(b.location.lng, b.location.lat);
                        var pt = new BMap.Point(bd.lng, bd.lat);
                        map.centerAndZoom(pt, 10);
                    };

                    buildingList.appendChild(li);
                })();
            }
        }

        searchInput.oninput = performSearch;
        searchInput.onkeypress = function(e) {
            if (e.key === 'Enter') performSearch();
        };
    }

    function clearSearch() {
        document.getElementById('mapSearchInput').value = '';
        document.getElementById('searchClear').classList.remove('show');
        initBuildingList();
        updateBuildingCount();
    }

    function updateBuildingCount() {
        var count = document.getElementById('buildingList').querySelectorAll('li:not(.no-result)').length;
        document.getElementById('buildingCount').textContent = '(' + count + ')';
    }

    function initBuildingSelect() {
        var select = document.getElementById('endBuilding');
        for (var i = 0; i < buildingsData.length; i++) {
            var b = buildingsData[i];
            var option = document.createElement('option');
            option.value = b.id;
            option.textContent = b.name + ' - ' + b.dynasty + ' · ' + b.author;
            select.appendChild(option);
        }
    }

    function getCurrentLocation() {
        var status = document.getElementById('routeStatus');
        if (navigator.geolocation) {
            status.className = 'route-status show info';
            status.textContent = '⏳ 正在获取位置...';

            navigator.geolocation.getCurrentPosition(function(pos) {
                var wgsLat = pos.coords.latitude;
                var wgsLng = pos.coords.longitude;

                var gcj = wgs84ToGcj02(wgsLng, wgsLat);
                var bd = gcj02ToBd09(gcj.lng, gcj.lat);

                document.getElementById('startLocation').value =
                    bd.lng.toFixed(6) + ',' + bd.lat.toFixed(6);

                map.centerAndZoom(new BMap.Point(bd.lng, bd.lat), 14);

                status.className = 'route-status show success';
                status.textContent = '✅ 定位成功！';
                setTimeout(function() {
                    status.classList.remove('show');
                }, 3000);
            }, function(err) {
                status.className = 'route-status show error';
                status.textContent = '❌ 定位失败，请手动输入地址或坐标';
                console.log('定位失败：', err);
            }, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        } else {
            status.className = 'route-status show error';
            status.textContent = '❌ 浏览器不支持定位，请手动输入地址';
        }
    }

    function clearRoutes() {
        if (drivingRoute) drivingRoute.clearResults();
        if (transitRoute) transitRoute.clearResults();
    }

    function planRoute() {
        var startInput = document.getElementById('startLocation').value.trim();
        var endId = document.getElementById('endBuilding').value;
        var mode = document.getElementById('navMode').value;
        var status = document.getElementById('routeStatus');

        status.className = 'route-status show info';
        status.textContent = '⏳ 正在规划路线...';

        if (!startInput) {
            status.className = 'route-status show error';
            status.textContent = '❌ 请输入起始位置';
            return;
        }
        if (!endId) {
            status.className = 'route-status show error';
            status.textContent = '❌ 请选择终点建筑';
            return;
        }

        var endBuilding = buildingsData.find(function(b) { return String(b.id) === String(endId); });
        if (!endBuilding) {
            status.className = 'route-status show error';
            status.textContent = '❌ 未找到终点建筑';
            return;
        }

        clearRoutes();

        var endBd = gcj02ToBd09(endBuilding.location.lng, endBuilding.location.lat);
        var endPoint = new BMap.Point(endBd.lng, endBd.lat);

        if (startInput.includes(',')) {
            var parts = startInput.split(',');
            var lng = parseFloat(parts[0]);
            var lat = parseFloat(parts[1]);
            if (!isFinite(lng) || !isFinite(lat)) {
                status.className = 'route-status show error';
                status.textContent = '❌ 坐标格式不正确，请输入如：116.39,39.9';
                return;
            }

            var startPoint;
            if (lng > 70 && lng < 140 && lat > 0 && lat < 60) {
                startPoint = new BMap.Point(lng, lat);
            } else {
                var startBd = gcj02ToBd09(lng, lat);
                startPoint = new BMap.Point(startBd.lng, startBd.lat);
            }

            executeBaiduRoute(mode, startPoint, endPoint);
        } else {
            geocoder.getPoint(startInput, function(pt) {
                if (!pt) {
                    status.className = 'route-status show error';
                    status.textContent = '❌ 无法解析起始位置，请输入更具体的地址';
                    return;
                }
                executeBaiduRoute(mode, pt, endPoint);
            });
        }
    }

    function executeBaiduRoute(mode, startPoint, endPoint) {
        var status = document.getElementById('routeStatus');

        if (mode === 'drive') {
            drivingRoute.search(startPoint, endPoint);
            status.className = 'route-status show success';
            status.textContent = '✅ 驾车路线已规划完成！';
        } else if (mode === 'bus') {
            transitRoute.search(startPoint, endPoint);
            status.className = 'route-status show success';
            status.textContent = '✅ 公交路线已规划完成！';
        }
    }

    function togglePanel() {
        var body = document.getElementById('panelBody');
        var arrow = document.getElementById('panelArrow');
        body.classList.toggle('show');
        arrow.classList.toggle('open');
    }

    window.togglePanel = togglePanel;
    window.getCurrentLocation = getCurrentLocation;
    window.planRoute = planRoute;
    window.clearSearch = clearSearch;
    window.handleLogout = handleLogout;
    window.updateNavUserStatus = updateNavUserStatus;
</script>
</body>
</html>
