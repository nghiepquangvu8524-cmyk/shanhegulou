<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · 山河故楼</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
    <style>
        .auth-page {
            min-height: 100vh;
            background: linear-gradient(160deg, #f8f4ee 0%, #efe8df 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px 36px 32px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .auth-header .logo {
            font-size: 2.4rem;
            color: #b8956a;
            margin-bottom: 4px;
        }

        .auth-header h1 {
            color: #3d2c1b;
            font-size: 1.4rem;
            font-weight: 600;
            font-family: 'STSong', 'SimSun', serif;
        }

        .auth-header p {
            color: #9a8a7a;
            font-size: 0.85rem;
            margin-top: 2px;
        }

        .auth-form .form-group {
            margin-bottom: 16px;
        }

        .auth-form label {
            display: block;
            color: #5a4a3a;
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .auth-form .input-wrap {
            position: relative;
        }

        .auth-form .input-wrap i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #c0b0a0;
            font-size: 0.9rem;
        }

        .auth-form .input-wrap input {
            width: 100%;
            padding: 10px 14px 10px 40px;
            border: 1px solid rgba(184, 149, 106, 0.12);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.5);
            color: #3d2c1b;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }

        .auth-form .input-wrap input:focus {
            border-color: #b8956a;
            box-shadow: 0 0 0 3px rgba(184, 149, 106, 0.04);
            background: #fff;
        }

        .auth-form .input-wrap input::placeholder {
            color: #c0b0a0;
        }

        .auth-form .input-wrap .toggle-pwd {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #c0b0a0;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .auth-form .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .auth-form .form-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #9a8a7a;
            font-size: 0.82rem;
            font-weight: 400;
            cursor: pointer;
        }

        .auth-form .form-options label input[type="checkbox"] {
            accent-color: #b8956a;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .auth-form .form-options a {
            color: #b8956a;
            text-decoration: none;
            font-size: 0.82rem;
        }

        .auth-form .form-options a:hover {
            text-decoration: underline;
        }

        .btn-auth {
            width: 100%;
            padding: 12px;
            background: #b8956a;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(184, 149, 106, 0.2);
        }

        .btn-auth:hover {
            background: #a8845a;
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(184, 149, 106, 0.3);
        }

        .btn-auth:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .auth-error {
            background: rgba(192, 57, 43, 0.06);
            color: #c0392b;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 14px;
            display: none;
            border-left: 3px solid #c0392b;
        }

        .auth-error.show {
            display: block;
        }

        .auth-success {
            background: rgba(39, 174, 96, 0.06);
            color: #27ae60;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 14px;
            display: none;
            border-left: 3px solid #27ae60;
        }

        .auth-success.show {
            display: block;
        }

        .auth-footer {
            text-align: center;
            margin-top: 18px;
            color: #9a8a7a;
            font-size: 0.85rem;
        }

        .auth-footer a {
            color: #b8956a;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 18px 0;
            color: #c0b0a0;
            font-size: 0.78rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(184, 149, 106, 0.1);
        }

        .social-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(184, 149, 106, 0.1);
            background: rgba(255, 255, 255, 0.3);
            color: #9a8a7a;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .social-btn:hover {
            border-color: #b8956a;
            color: #b8956a;
            background: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
        }

        .auth-back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #9a8a7a;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 16px;
            transition: color 0.3s ease;
        }

        .auth-back-link:hover {
            color: #b8956a;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 28px 20px 24px;
                border-radius: 16px;
            }
        }

        body.dark-theme .auth-page {
            background: linear-gradient(160deg, #0a0a1a 0%, #1a1a2e 100%);
        }

        body.dark-theme .auth-container {
            background: rgba(26, 26, 46, 0.85);
            border-color: rgba(255, 255, 255, 0.04);
        }

        body.dark-theme .auth-header h1 {
            color: #f5f0ea;
        }

        body.dark-theme .auth-form label {
            color: rgba(255, 255, 255, 0.6);
        }

        body.dark-theme .auth-form .input-wrap input {
            background: rgba(255, 255, 255, 0.04);
            color: #f5f0ea;
            border-color: rgba(255, 255, 255, 0.06);
        }

        body.dark-theme .auth-form .input-wrap input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: #c9a87b;
        }

        body.dark-theme .auth-form .input-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        body.dark-theme .auth-form .form-options label {
            color: rgba(255, 255, 255, 0.4);
        }

        body.dark-theme .auth-divider {
            color: rgba(255, 255, 255, 0.15);
        }

        body.dark-theme .social-btn {
            border-color: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.02);
        }

        body.dark-theme .social-btn:hover {
            border-color: #c9a87b;
            color: #c9a87b;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <a href="index.html" class="auth-back-link">
                <i class="fas fa-arrow-left"></i> 返回首页
            </a>

            <div class="auth-header">
                <div class="logo"><i class="fas fa-landmark"></i></div>
                <h1>欢迎回来</h1>
                <p>登录您的山河故楼账号</p>
            </div>

            <div id="authError" class="auth-error"></div>
            <div id="authSuccess" class="auth-success"></div>

            <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">邮箱地址</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="请输入邮箱" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="请输入密码" required>
                        <button type="button" class="toggle-pwd" onclick="togglePwd('loginPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label><input type="checkbox" checked> 记住我</label>
                    <a href="#">忘记密码？</a>
                </div>

                <button type="submit" class="btn-auth" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </form>

            <div class="auth-divider">或使用</div>

            <div class="social-btns">
                <button class="social-btn" title="微信登录"><i class="fab fa-weixin"></i></button>
                <button class="social-btn" title="微博登录"><i class="fab fa-weibo"></i></button>
            </div>

            <div class="auth-footer">
                还没有账号？ <a href="register.html">立即注册</a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        function togglePwd(id) {
            var input = document.getElementById(id);
            var icon = input.nextElementSibling.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            var email = document.getElementById('loginEmail').value.trim();
            var password = document.getElementById('loginPassword').value;
            var errorEl = document.getElementById('authError');
            var successEl = document.getElementById('authSuccess');
            var btn = document.getElementById('loginBtn');

            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            if (!email || !password) {
                errorEl.textContent = '请填写完整的登录信息';
                errorEl.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';

            setTimeout(function() {
                var result = loginUser(email, password);
                if (result.success) {
                    successEl.textContent = '登录成功！正在跳转...';
                    successEl.classList.add('show');
                    setTimeout(function() { window.location.href = 'index.html'; }, 800);
                } else {
                    errorEl.textContent = result.error;
                    errorEl.classList.add('show');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登录';
                }
            }, 600);
        }

        if (getCurrentUser()) window.location.href = 'index.html';
    </script>
</body>
</html>
