<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 · 山河故楼</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
    <script src="auth.js"></script>
    <script src="data.js"></script>
    <style>
        .profile-page {
            min-height: calc(100vh - 200px);
            background: linear-gradient(160deg, #f8f4ee 0%, #efe8df 100%);
            padding: 24px 0 40px;
        }

        .profile-page .container {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .profile-header-title {
            margin-bottom: 24px;
        }

        .profile-header-title h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #3d2c1b;
            font-family: 'STSong', 'SimSun', serif;
        }

        .profile-header-title h1 i {
            color: #b8956a;
            margin-right: 10px;
        }

        .profile-header-title p {
            color: #9a8a7a;
            font-size: 0.95rem;
            margin-top: 2px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 24px 28px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.02);
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .profile-card:hover {
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        .profile-avatar-section {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .profile-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #b8956a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .profile-info {
            flex: 1;
        }

        .profile-info .name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #3d2c1b;
        }

        .profile-info .email {
            color: #9a8a7a;
            font-size: 0.85rem;
            margin-top: 2px;
        }

        .profile-info .join {
            color: #c0b0a0;
            font-size: 0.75rem;
            margin-top: 2px;
        }

        .profile-stats {
            display: flex;
            gap: 32px;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(184, 149, 106, 0.06);
        }

        .profile-stats .stat .num {
            font-size: 1.2rem;
            font-weight: 700;
            color: #b8956a;
            display: block;
        }

        .profile-stats .stat .label {
            font-size: 0.75rem;
            color: #9a8a7a;
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #3d2c1b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            color: #b8956a;
        }

        .review-item {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 6px;
            border: 1px solid rgba(184, 149, 106, 0.04);
            transition: all 0.3s ease;
        }

        .review-item:hover {
            background: rgba(255, 255, 255, 0.7);
        }

        .review-item .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .review-item .meta .building {
            color: #b8956a;
            font-weight: 500;
            font-size: 0.82rem;
        }

        .review-item .meta .rating {
            color: #f39c12;
            font-size: 0.75rem;
        }

        .review-item .meta .rating i.empty {
            color: #e0d5c8;
        }

        .review-item .meta .time {
            color: #c0b0a0;
            font-size: 0.7rem;
        }

        .review-item .content {
            color: #5a4a3a;
            font-size: 0.82rem;
            line-height: 1.6;
            margin-top: 4px;
        }

        .review-item .actions {
            margin-top: 6px;
            display: flex;
            gap: 10px;
        }

        .review-item .actions button {
            background: none;
            border: none;
            color: #9a8a7a;
            cursor: pointer;
            font-size: 0.72rem;
            padding: 2px 10px;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .review-item .actions .del:hover {
            color: #c0392b;
            background: rgba(192, 57, 43, 0.04);
        }

        .empty-msg {
            color: #c0b0a0;
            text-align: center;
            padding: 20px 0;
        }

        .empty-msg i {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 8px;
            opacity: 0.3;
        }

        .empty-msg a {
            color: #b8956a;
            text-decoration: none;
        }

        .empty-msg a:hover {
            text-decoration: underline;
        }

        .settings-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .settings-row .btn-settings {
            padding: 8px 20px;
            border-radius: 10px;
            border: 1px solid rgba(184, 149, 106, 0.08);
            background: rgba(255, 255, 255, 0.3);
            color: #5a4a3a;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 0.82rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .settings-row .btn-settings:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: #b8956a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(184, 149, 106, 0.1);
        }

        .settings-row .btn-settings.danger:hover {
            border-color: #c0392b;
            color: #c0392b;
            box-shadow: 0 4px 12px rgba(192, 57, 43, 0.1);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            animation: modalFadeIn 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 32px 36px;
            max-width: 420px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .modal-box .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-box .modal-header h2 {
            font-size: 1.2rem;
            color: #3d2c1b;
            font-family: 'STSong', 'SimSun', serif;
        }

        .modal-box .modal-header h2 i {
            color: #b8956a;
            margin-right: 8px;
        }

        .modal-box .modal-close {
            background: none;
            border: none;
            color: #c0b0a0;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .modal-box .modal-close:hover {
            background: rgba(184, 149, 106, 0.06);
            color: #5a4a3a;
        }

        .modal-box .form-group {
            margin-bottom: 14px;
        }

        .modal-box .form-group label {
            display: block;
            color: #5a4a3a;
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .modal-box .form-group input {
            width: 100%;
            padding: 9px 14px;
            border: 1px solid rgba(184, 149, 106, 0.12);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.5);
            color: #3d2c1b;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
        }

        .modal-box .form-group input:focus {
            border-color: #b8956a;
            box-shadow: 0 0 0 3px rgba(184, 149, 106, 0.04);
            background: #fff;
        }

        .modal-box .form-group input::placeholder {
            color: #c0b0a0;
        }

        .modal-box .btn-modal {
            width: 100%;
            padding: 10px;
            background: #b8956a;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .modal-box .btn-modal:hover {
            background: #a8845a;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(184, 149, 106, 0.2);
        }

        .modal-box .btn-modal:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .modal-box .modal-error {
            background: rgba(192, 57, 43, 0.06);
            color: #c0392b;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 12px;
            display: none;
            border-left: 3px solid #c0392b;
        }

        .modal-box .modal-error.show {
            display: block;
        }

        .modal-box .modal-success {
            background: rgba(39, 174, 96, 0.06);
            color: #27ae60;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 12px;
            display: none;
            border-left: 3px solid #27ae60;
        }

        .modal-box .modal-success.show {
            display: block;
        }

        .login-prompt {
            text-align: center;
            padding: 30px 0;
        }

        .login-prompt i {
            font-size: 3rem;
            color: #d0c0b0;
            display: block;
            margin-bottom: 12px;
        }

        .login-prompt h3 {
            color: #9a8a7a;
            font-weight: 400;
        }

        .login-prompt p {
            color: #c0b0a0;
            margin-top: 6px;
        }

        .login-prompt a {
            color: #b8956a;
            text-decoration: none;
            font-weight: 500;
        }

        .theme-setting {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(184, 149, 106, 0.04);
        }

        .theme-setting:last-child {
            border-bottom: none;
        }

        .theme-setting .label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #5a4a3a;
            font-size: 0.9rem;
        }

        .theme-setting .label i {
            color: #b8956a;
            width: 20px;
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background: #e0d5c8;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            flex-shrink: 0;
        }

        .toggle-switch .toggle-dot {
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .toggle-switch.active {
            background: #b8956a;
        }

        .toggle-switch.active .toggle-dot {
            left: 22px;
        }

        @media (max-width: 768px) {
            .profile-page { padding: 16px 0 24px; }
            .profile-page .container { padding: 0 16px; }
            .profile-header-title h1 { font-size: 1.4rem; }
            .profile-card { padding: 18px 20px; border-radius: 14px; }
            .profile-avatar-section { flex-direction: column; text-align: center; }
            .profile-stats { justify-content: center; }
            .review-item .meta { flex-direction: column; align-items: flex-start; }
            .modal-box { padding: 24px 20px; }
        }

        @media (max-width: 480px) {
            .profile-card { padding: 14px 16px; }
            .profile-avatar { width: 60px; height: 60px; font-size: 1.6rem; }
            .profile-info .name { font-size: 1.1rem; }
            .settings-row .btn-settings { font-size: 0.75rem; padding: 6px 14px; }
            .modal-box { padding: 20px 16px; }
        }

        body.dark-theme .profile-page {
            background: linear-gradient(160deg, #0a0a1a 0%, #1a1a2e 100%);
        }

        body.dark-theme .profile-header-title h1 {
            color: #f5f0ea;
        }

        body.dark-theme .profile-header-title p {
            color: rgba(255, 255, 255, 0.4);
        }

        body.dark-theme .profile-card {
            background: rgba(26, 26, 46, 0.85);
            border-color: rgba(255, 255, 255, 0.04);
        }

        body.dark-theme .profile-info .name {
            color: #f5f0ea;
        }

        body.dark-theme .review-item {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.04);
        }

        body.dark-theme .review-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        body.dark-theme .review-item .content {
            color: rgba(255, 255, 255, 0.6);
        }

        body.dark-theme .review-item .actions button {
            color: rgba(255, 255, 255, 0.3);
        }

        body.dark-theme .settings-row .btn-settings {
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.6);
            border-color: rgba(255, 255, 255, 0.04);
        }

        body.dark-theme .settings-row .btn-settings:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: #c9a87b;
            color: #f5f0ea;
        }

        body.dark-theme .modal-box {
            background: rgba(26, 26, 46, 0.95);
            border-color: rgba(255, 255, 255, 0.04);
        }

        body.dark-theme .modal-box .modal-header h2 {
            color: #f5f0ea;
        }

        body.dark-theme .modal-box .form-group label {
            color: rgba(255, 255, 255, 0.5);
        }

        body.dark-theme .modal-box .form-group input {
            background: rgba(255, 255, 255, 0.04);
            color: #f5f0ea;
            border-color: rgba(255, 255, 255, 0.06);
        }

        body.dark-theme .modal-box .form-group input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: #c9a87b;
        }

        body.dark-theme .modal-box .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        body.dark-theme .theme-setting .label {
            color: rgba(255, 255, 255, 0.6);
        }

        body.dark-theme .toggle-switch {
            background: rgba(255, 255, 255, 0.15);
        }

        body.dark-theme .toggle-switch.active {
            background: #c9a87b;
        }
    </style>
</head>

        </div>

<main class="profile-page">
    <div class="container">
        <div class="profile-header-title">
            <h1><i class="fas fa-user-circle"></i> 个人中心</h1>
            <p>管理您的个人信息和评价</p>
        </div>

        <div class="profile-card" id="profileCard"></div>

        <div class="profile-card">
            <div class="section-title"><i class="fas fa-comment-dots"></i> 我的评价</div>
            <div id="myReviews"></div>
        </div>

        <div class="profile-card">
            <div class="section-title"><i class="fas fa-cog"></i> 账户设置</div>
            <div class="settings-row" style="margin-bottom:12px;">
                <button class="btn-settings" onclick="openEditProfile()">
                    <i class="fas fa-user-edit"></i> 编辑资料
                </button>
                <button class="btn-settings" onclick="openChangePassword()">
                    <i class="fas fa-key"></i> 修改密码
                </button>
                <button class="btn-settings danger" onclick="handleDelete()">
                    <i class="fas fa-trash-alt"></i> 注销账号
                </button>
            </div>

            <div class="section-title" style="margin-top:16px;margin-bottom:8px;font-size:0.85rem;">
                <i class="fas fa-palette"></i> 偏好设置
            </div>
            <div class="theme-setting">
                <span class="label"><i class="fas fa-moon"></i> 深色模式</span>
                <div class="toggle-switch" id="themeToggle" onclick="toggleTheme()">
                    <div class="toggle-dot"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<div class="modal-overlay" id="editProfileModal">
    <div class="modal-box">
        <div class="modal-header">
            <h2><i class="fas fa-user-edit"></i> 编辑资料</h2>
            <button class="modal-close" onclick="closeModal('editProfileModal')">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="editProfileError" class="modal-error"></div>
        <div id="editProfileSuccess" class="modal-success"></div>
        <form onsubmit="handleEditProfile(event)">
            <div class="form-group">
                <label for="editName">昵称</label>
                <input type="text" id="editName" placeholder="请输入昵称" required minlength="2">
            </div>
            <div class="form-group">
                <label for="editEmail">邮箱地址</label>
                <input type="email" id="editEmail" placeholder="请输入邮箱" required>
            </div>
            <button type="submit" class="btn-modal" id="editProfileBtn">
                <i class="fas fa-save"></i> 保存修改
            </button>
        </form>
    </div>
</div>

<div class="modal-overlay" id="changePwdModal">
    <div class="modal-box">
        <div class="modal-header">
            <h2><i class="fas fa-key"></i> 修改密码</h2>
            <button class="modal-close" onclick="closeModal('changePwdModal')">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="changePwdError" class="modal-error"></div>
        <div id="changePwdSuccess" class="modal-success"></div>
        <form onsubmit="handleChangePassword(event)">
            <div class="form-group">
                <label for="oldPwd">原密码</label>
                <input type="password" id="oldPwd" placeholder="请输入原密码" required>
            </div>
            <div class="form-group">
                <label for="newPwd">新密码</label>
                <input type="password" id="newPwd" placeholder="至少6位，含字母和数字" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirmPwd">确认新密码</label>
                <input type="password" id="confirmPwd" placeholder="再次输入新密码" required>
            </div>
            <button type="submit" class="btn-modal" id="changePwdBtn">
                <i class="fas fa-check"></i> 确认修改
            </button>
        </form>
    </div>
</div>

<script>
    // ===== 用户状态 =====
    function updateNavUserStatus() {
        var container = document.getElementById('navUserStatus');
        var user = getCurrentUser();
        if (user) {
            container.innerHTML = `
                <a href="profile.html" class="nav-user-avatar" title="个人中心">${user.name.charAt(0).toUpperCase()}</a>
                <span class="nav-user-name">${user.name}</span>
                <button class="nav-logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
            `;
        } else {
            container.innerHTML = `
                <a href="login.html" class="nav-login-link">登录</a>
                <a href="register.html" class="nav-register-link">注册</a>
            `;
        }
    }

    function handleLogout() {
        if (confirm('确定要退出登录吗？')) {
            logout();
            updateNavUserStatus();
            window.location.reload();
        }
    }

    function openModal(id) {
        document.getElementById(id).classList.add('show');
        var errorEl = document.getElementById(id).querySelector('.modal-error');
        var successEl = document.getElementById(id).querySelector('.modal-success');
        if (errorEl) errorEl.classList.remove('show');
        if (successEl) successEl.classList.remove('show');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('show');
    }

    document.querySelectorAll('.modal-overlay').forEach(function(el) {
        el.addEventListener('click', function(e) {
            if (e.target === el) el.classList.remove('show');
        });
    });

    function openEditProfile() {
        var user = getCurrentUser();
        if (!user) { alert('请先登录'); window.location.href = 'login.html'; return; }
        fetchUserProfile().then(function(profile) {
            if (profile) {
                document.getElementById('editName').value = profile.name || '';
                document.getElementById('editEmail').value = profile.email || '';
            }
            openModal('editProfileModal');
        });
    }

    async function handleEditProfile(e) {
        e.preventDefault();
        var user = getCurrentUser();
        if (!user) { alert('请先登录'); window.location.href = 'login.html'; return; }

        var name = document.getElementById('editName').value.trim();
        var email = document.getElementById('editEmail').value.trim();
        var errorEl = document.getElementById('editProfileError');
        var successEl = document.getElementById('editProfileSuccess');
        var btn = document.getElementById('editProfileBtn');

        errorEl.classList.remove('show');
        successEl.classList.remove('show');

        if (!name || !email) { errorEl.textContent = '请填写完整信息'; errorEl.classList.add('show'); return; }
        if (name.length < 2) { errorEl.textContent = '昵称至少2个字符'; errorEl.classList.add('show'); return; }
        if (!email.includes('@')) { errorEl.textContent = '请输入有效的邮箱地址'; errorEl.classList.add('show'); return; }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 保存中...';

        try {
            var result = await updateUserProfile(user.id, { name: name, email: email });
            if (result.success) {
                successEl.textContent = '✅ 资料更新成功！';
                successEl.classList.add('show');
                updateNavUserStatus();
                renderProfile();
                setTimeout(function() {
                    closeModal('editProfileModal');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-save"></i> 保存修改';
                }, 800);
            } else {
                errorEl.textContent = result.error || '更新失败，请重试';
                errorEl.classList.add('show');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> 保存修改';
            }
        } catch (err) {
            errorEl.textContent = '网络错误，请重试';
            errorEl.classList.add('show');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> 保存修改';
        }
    }

    function openChangePassword() {
        var user = getCurrentUser();
        if (!user) { alert('请先登录'); window.location.href = 'login.html'; return; }
        document.getElementById('oldPwd').value = '';
        document.getElementById('newPwd').value = '';
        document.getElementById('confirmPwd').value = '';
        openModal('changePwdModal');
    }

    async function handleChangePassword(e) {
        e.preventDefault();
        var user = getCurrentUser();
        if (!user) { alert('请先登录'); window.location.href = 'login.html'; return; }

        var oldPwd = document.getElementById('oldPwd').value;
        var newPwd = document.getElementById('newPwd').value;
        var confirmPwd = document.getElementById('confirmPwd').value;
        var errorEl = document.getElementById('changePwdError');
        var successEl = document.getElementById('changePwdSuccess');
        var btn = document.getElementById('changePwdBtn');

        errorEl.classList.remove('show');
        successEl.classList.remove('show');

        if (!oldPwd || !newPwd || !confirmPwd) {
            errorEl.textContent = '请填写完整信息';
            errorEl.classList.add('show');
            return;
        }
        if (newPwd.length < 6) {
            errorEl.textContent = '新密码至少6位';
            errorEl.classList.add('show');
            return;
        }
        if (!/[a-zA-Z]/.test(newPwd) || !/\d/.test(newPwd)) {
            errorEl.textContent = '新密码需包含字母和数字';
            errorEl.classList.add('show');
            return;
        }
        if (newPwd !== confirmPwd) {
            errorEl.textContent = '两次输入的密码不一致';
            errorEl.classList.add('show');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 验证中...';

        try {
            var result = await changePassword(user.id, oldPwd, newPwd);
            if (result.success) {
                successEl.textContent = '✅ 密码修改成功！';
                successEl.classList.add('show');
                setTimeout(function() {
                    closeModal('changePwdModal');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check"></i> 确认修改';
                }, 800);
            } else {
                errorEl.textContent = result.error || '修改失败，请重试';
                errorEl.classList.add('show');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> 确认修改';
            }
        } catch (err) {
            errorEl.textContent = '网络错误，请重试';
            errorEl.classList.add('show');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-check"></i> 确认修改';
        }
    }

    async function renderProfile() {
        var user = getCurrentUser();
        var card = document.getElementById('profileCard');
        var container = document.getElementById('myReviews');

        if (!user) {
            card.innerHTML = `
                <div class="login-prompt">
                    <i class="fas fa-user-circle"></i>
                    <h3>请先登录</h3>
                    <p><a href="login.html">登录</a> 或 <a href="register.html">注册</a></p>
                </div>
            `;
            container.innerHTML = '';
            return;
        }

        try {
            var myReviews = await getReviewsByUser(user.id);
            
            var likes = 0;
            myReviews.forEach(function(r) { 
                var l = JSON.parse(r.likes || '[]');
                likes += l.length; 
            });

            var joinDate = user.joinDate ? new Date(user.joinDate) : new Date();

            card.innerHTML = `
                <div class="profile-avatar-section">
                    <div class="profile-avatar">${user.name.charAt(0).toUpperCase()}</div>
                    <div class="profile-info">
                        <div class="name">${user.name}</div>
                        <div class="email">${user.email}</div>
                        <div class="join">
                            <i class="far fa-calendar-alt"></i>
                            加入于 ${joinDate.toLocaleDateString('zh-CN')}
                        </div>
                    </div>
                </div>
                <div class="profile-stats">
                    <div class="stat"><span class="num">${myReviews.length}</span><span class="label">评价</span></div>
                    <div class="stat"><span class="num">${likes}</span><span class="label">获得点赞</span></div>
                </div>
            `;

            if (myReviews.length === 0) {
                container.innerHTML = `
                    <div class="empty-msg">
                        <i class="fas fa-pen-fancy"></i>
                        您还没有发表过评价<br>
                        <a href="buildings.html">去评价古建筑 →</a>
                    </div>
                `;
                return;
            }

            var html = '';
            myReviews.forEach(function(r) {
                var stars = '';
                for (var i = 1; i <= 5; i++) {
                    stars += '<i class="fas fa-star ' + (i <= r.rating ? '' : 'empty') + '"></i>';
                }
                html += `
                    <div class="review-item">
                        <div class="meta">
                            <span class="building"><i class="fas fa-landmark"></i> ${r.building_name}</span>
                            <span class="rating">${stars}</span>
                            <span class="time">${formatTime(r.created_at)}</span>
                        </div>
                        <div class="content">${r.content}</div>
                        <div class="actions">
                            <button onclick="alert('编辑功能开发中...')"><i class="fas fa-edit"></i> 编辑</button>
                            <button class="del" onclick="deleteReview('${r.id}')"><i class="fas fa-trash"></i> 删除</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        } catch (err) {
            console.error('加载用户评价失败:', err);
            container.innerHTML = '<div class="empty-msg"><i class="fas fa-exclamation-triangle"></i> 加载失败，请刷新</div>';
        }
    }

    async function deleteReview(id) {
        if (!confirm('确定要删除这条评价吗？')) return;
        var token = getToken();
        if (!token) {
            alert('请先登录');
            return;
        }

        try {
            var response = await fetch(API_BASE + '/reviews/' + id, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });
            var data = await response.json();
            if (data.success) {
                renderProfile();
            } else {
                alert(data.message || '删除失败');
            }
        } catch (err) {
            alert('网络错误，请重试');
            console.error(err);
        }
    }

    async function handleDelete() {
        if (!confirm('确定要注销账号吗？此操作不可恢复！')) return;
        if (!confirm('再次确认：所有数据将被永久删除。')) return;

        var password = prompt('请输入密码确认注销：');
        if (!password) return;

        try {
            var result = await deleteAccount(password);
            if (result.success) {
                alert('账号已注销');
                window.location.href = 'index.html';
            } else {
                alert(result.message || '注销失败，请重试');
            }
        } catch (err) {
            alert('网络错误，请重试');
        }
    }

    function formatTime(dateStr) {
        var d = new Date(dateStr);
        var now = Date.now();
        var diff = now - d.getTime();
        if (diff < 60000) return '刚刚';
        if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
        if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
        if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
        return d.toLocaleDateString('zh-CN');
    }

    document.addEventListener('DOMContentLoaded', function() {
        updateNavUserStatus();
        renderProfile();
    });

    // 暴露全局函数
    window.toggleTheme = toggleTheme;
    window.handleLogout = handleLogout;
    window.deleteReview = deleteReview;
    window.handleDelete = handleDelete;
    window.openEditProfile = openEditProfile;
    window.openChangePassword = openChangePassword;
    window.handleEditProfile = handleEditProfile;
    window.handleChangePassword = handleChangePassword;
    window.openModal = openModal;
    window.closeModal = closeModal;
</script>
</body>
</html>
